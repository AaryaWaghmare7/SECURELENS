services:
  - type: web
    name: securelens
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    disk:
      name: securelens-media
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "securelens.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: MEDIA_ROOT
        value: "/var/data/media"
      - key: DATABASE_URL
        fromDatabase:
          name: securelens-db
          property: connectionString

databases:
  - name: securelens-db
    plan: free
